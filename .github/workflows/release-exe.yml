name: 发布 Windows 可执行文件

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，例如 1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-exe:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.3.10

      - name: 安装依赖
        run: bun run install:all

      - name: 构建 Windows exe
        run: bun run build:exe

      - name: 重命名发布文件
        run: mv dist/last-version-ppt.exe dist/last-version-ppt-${{ inputs.version }}.exe

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/last-version-ppt-${{ inputs.version }}.exe
